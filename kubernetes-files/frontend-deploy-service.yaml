apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 783764602913.dkr.ecr.us-east-1.amazonaws.com/frontend:4
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_BASE_URL
          value: "http://a5195c1a6d5ed4203aed0e4fff88c829-1165010549.us-east-1.elb.amazonaws.com"

---
apiVersion: v1
kind: Service
metadata: 
  name: frontend
spec:
  selector:
    app: frontend  
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer
